<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>// USER_PROFILE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #030712;
      overflow-x: hidden;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.015) 2px,
        rgba(0, 255, 65, 0.015) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* Matrix rain canvas */
    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.07;
      z-index: 0;
    }

    .content { position: relative; z-index: 10; }

    /* Glitch text */
    .glitch {
      position: relative;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #0ff;
      animation: glitch-1 3.5s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }
    .glitch::after {
      color: #f0f;
      animation: glitch-2 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes glitch-1 {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      91% { transform: translate(-3px, 1px); opacity: 1; }
      93% { transform: translate(3px, -1px); opacity: 1; }
      95% { transform: translate(0); opacity: 0; }
    }
    @keyframes glitch-2 {
      0%, 92%, 100% { transform: translate(0); opacity: 0; }
      93% { transform: translate(3px, 2px); opacity: 1; }
      95% { transform: translate(-3px, -2px); opacity: 1; }
      97% { transform: translate(0); opacity: 0; }
    }

    /* Social button */
    .social-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 20px;
      background: rgba(0, 255, 65, 0.04);
      border: 1px solid rgba(0, 255, 65, 0.2);
      color: #a0ffb8;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      transition: all 0.2s ease;
      overflow: hidden;
      cursor: pointer;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.08), transparent);
      transition: left 0.4s ease;
    }
    .social-btn:hover::before { left: 100%; }
    .social-btn:hover {
      background: rgba(0, 255, 65, 0.1);
      border-color: #00ff41;
      color: #00ff41;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
      transform: translateX(4px);
    }
    .social-btn .icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .social-btn:hover .icon { opacity: 1; }
    .social-btn .arrow {
      margin-left: auto;
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.2s ease;
      font-size: 0.75rem;
      color: #00ff41;
    }
    .social-btn:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Terminal cursor blink */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: #00ff41;
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Avatar ring */
    .avatar-ring {
      border: 1.5px solid rgba(0,255,65,0.4);
      box-shadow: 0 0 0 4px rgba(0,255,65,0.06), 0 0 30px rgba(0,255,65,0.15);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 4px rgba(0,255,65,0.06), 0 0 30px rgba(0,255,65,0.15); }
      50% { box-shadow: 0 0 0 8px rgba(0,255,65,0.03), 0 0 50px rgba(0,255,65,0.25); }
    }

    /* Status dot */
    .status-dot {
      width: 8px; height: 8px;
      background: #00ff41;
      border-radius: 50%;
      box-shadow: 0 0 6px #00ff41;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    /* Card glow */
    .card {
      background: rgba(3, 7, 18, 0.9);
      border: 1px solid rgba(0, 255, 65, 0.12);
      box-shadow: 0 0 60px rgba(0,255,65,0.04), 0 25px 50px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }

    /* Divider */
    .divider {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.3), transparent);
    }

    /* Top bar flicker */
    .top-bar {
      animation: flicker 8s linear infinite;
    }
    @keyframes flicker {
      0%, 99%, 100% { opacity: 1; }
      99.5% { opacity: 0.85; }
    }
  </style>
</head>

  <script>
    // ── Matrix rain ──────────────────────────────────────
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF<>/{}[]|\\'.split('');
    let drops = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const cols = Math.floor(canvas.width / 16);
      drops = Array.from({ length: cols }, () => Math.random() * -50);
    }

    resize();
    window.addEventListener('resize', resize);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(3, 7, 18, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41';
      ctx.font = '14px JetBrains Mono, monospace';

      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * 16, y * 16);
        if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }

    setInterval(drawMatrix, 50);

    // ── Clock ─────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('sys-time').textContent =
        [now.getHours(), now.getMinutes(), now.getSeconds()]
          .map(n => String(n).padStart(2, '0'))
          .join(':');
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
